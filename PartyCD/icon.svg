<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- 배경 그라디언트: 깊은 다크 블루 -->
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    <!-- 방패 골드 그라디언트 -->
    <linearGradient id="shieldGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d77a"/>
      <stop offset="40%" stop-color="#c9a024"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <!-- 내부 방패 -->
    <linearGradient id="shieldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3050"/>
      <stop offset="100%" stop-color="#0d1825"/>
    </linearGradient>
    <!-- 시계 바늘 글로우 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 외곽 글로우 -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 쿨타임 스윕 마스크 -->
    <clipPath id="shieldClip">
      <path d="M128 32 L192 62 L192 140 C192 180 160 210 128 228 C96 210 64 180 64 140 L64 62 Z"/>
    </clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="256" height="256" rx="24" fill="url(#bg)"/>

  <!-- 미세한 노이즈 텍스처 효과 (패턴) -->
  <rect width="256" height="256" rx="24" fill="#ffffff" opacity="0.02"/>

  <!-- 외곽 장식 링 -->
  <circle cx="128" cy="130" r="108" fill="none" stroke="#c9a024" stroke-width="1.5" opacity="0.3"/>
  <circle cx="128" cy="130" r="112" fill="none" stroke="#f5d77a" stroke-width="0.5" opacity="0.15"/>

  <!-- 방패 외곽 (골드) -->
  <path d="M128 28 L198 60 L198 142 C198 186 162 218 128 236 C94 218 58 186 58 142 L58 60 Z"
        fill="url(#shieldGold)" filter="url(#outerGlow)" opacity="0.9"/>

  <!-- 방패 내부 (다크) -->
  <path d="M128 38 L188 66 L188 140 C188 178 156 208 128 224 C100 208 68 178 68 140 L68 66 Z"
        fill="url(#shieldInner)"/>

  <!-- 방패 내부 장식 라인 -->
  <path d="M128 48 L178 72 L178 138 C178 170 152 196 128 212 C104 196 78 170 78 138 L78 72 Z"
        fill="none" stroke="#c9a024" stroke-width="1" opacity="0.4"/>

  <!-- 쿨타임 스윕 (파란 하이라이트, 시계 방향으로 270도 채워진 상태) -->
  <g clip-path="url(#shieldClip)">
    <path d="M128 130 L128 28 A102 102 0 1 1 28 130 Z"
          fill="#2196f3" opacity="0.15"/>
  </g>

  <!-- 시계 눈금 -->
  <g transform="translate(128, 130)" opacity="0.6">
    <!-- 12시 -->
    <line x1="0" y1="-62" x2="0" y2="-72" stroke="#f5d77a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 3시 -->
    <line x1="62" y1="0" x2="72" y2="0" stroke="#f5d77a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 6시 -->
    <line x1="0" y1="62" x2="0" y2="72" stroke="#f5d77a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 9시 -->
    <line x1="-62" y1="0" x2="-72" y2="0" stroke="#f5d77a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 작은 눈금들 -->
    <line x1="44" y1="-44" x2="49" y2="-49" stroke="#c9a024" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="44" x2="49" y2="49" stroke="#c9a024" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-44" y1="44" x2="-49" y2="49" stroke="#c9a024" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-44" y1="-44" x2="-49" y2="-49" stroke="#c9a024" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 시계 바늘 (분침 - 쿨타임 표현) -->
  <g transform="translate(128, 130)" filter="url(#glow)">
    <!-- 긴 바늘 (10시 방향 - 쿨타임 진행 중) -->
    <line x1="0" y1="8" x2="-30" y2="-52" stroke="#4fc3f7" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 짧은 바늘 -->
    <line x1="0" y1="6" x2="20" y2="-35" stroke="#f5d77a" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 중심점 -->
  <circle cx="128" cy="130" r="5" fill="#f5d77a"/>
  <circle cx="128" cy="130" r="3" fill="#4fc3f7"/>

  <!-- 하단 십자가 장식 (힐러 상징) -->
  <g transform="translate(128, 185)" opacity="0.7">
    <rect x="-3" y="-10" width="6" height="20" rx="1" fill="#4caf50"/>
    <rect x="-10" y="-3" width="20" height="6" rx="1" fill="#4caf50"/>
  </g>

  <!-- 상단 검 장식 (차단기 상징) -->
  <g transform="translate(128, 68)" opacity="0.6">
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- RCT 텍스트 -->
  <text x="128" y="24" text-anchor="middle" font-family="'Cinzel', 'Palatino', serif"
        font-size="14" font-weight="700" letter-spacing="4"
        fill="#f5d77a" opacity="0.8">RCT</text>
</svg>
