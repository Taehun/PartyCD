<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PartyCD Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanline"></div>

  <header id="topbar">
    <div class="topbar-left">
      <div class="logo">PCD</div>
      <h1 data-i18n="title">PartyCD Viewer</h1>
    </div>
    <div class="topbar-right">
      <div id="status" class="status-idle" data-i18n="status_idle"></div>
      <button id="lang-toggle" title="EN / KO">EN</button>
      <button id="change-folder" hidden data-i18n="btn_change_folder"></button>
    </div>
  </header>

  <div id="setup">
    <div class="setup-box">
      <div class="setup-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h2 data-i18n="setup_title"></h2>
      <ol>
        <li><code>/combatlog</code> <span data-i18n="setup_step1"></span></li>
        <li data-i18n="setup_step2"></li>
        <li data-i18n="setup_step3"></li>
      </ol>
      <button id="pick" class="primary" data-i18n="btn_pick"></button>
      <p class="hint" data-i18n="setup_hint"></p>
    </div>
  </div>

  <main id="viewer" hidden>
    <section id="survival" class="panel panel--survival">
      <div class="panel-header">
        <span class="panel-icon">&#9876;</span>
        <h2 data-i18n="section_survival"></h2>
      </div>
      <div class="bars"></div>
      <p class="empty" data-i18n="empty"></p>
    </section>

    <section id="raidcd" class="panel panel--raidcd">
      <div class="panel-header">
        <span class="panel-icon">&#9764;</span>
        <h2 data-i18n="section_raidcd"></h2>
      </div>
      <div class="bars"></div>
      <p class="empty" data-i18n="empty"></p>
    </section>

    <section id="heroism" class="panel panel--heroism">
      <div class="panel-header">
        <span class="panel-icon">&#9889;</span>
        <h2 data-i18n="section_heroism"></h2>
      </div>
      <div class="bars"></div>
      <p class="empty" data-i18n="empty"></p>
    </section>

    <section id="battlerez" class="panel panel--battlerez">
      <div class="panel-header">
        <span class="panel-icon">&#9760;</span>
        <h2 data-i18n="section_battlerez"></h2>
      </div>
      <div class="bars"></div>
      <p class="empty" data-i18n="empty"></p>
    </section>

    <section id="history" class="panel panel--history">
      <div class="panel-header">
        <span class="panel-icon">&#9776;</span>
        <h2 data-i18n="section_history"></h2>
      </div>
      <ul></ul>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
