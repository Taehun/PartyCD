<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaidCD Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="grain-overlay"></div>

  <header id="topbar">
    <div class="topbar-left">
      <span class="logo">RCD</span>
      <span class="logo-subtitle" data-i18n="subtitle"></span>
    </div>
    <div class="topbar-right">
      <div id="status" class="status-pill status-idle">
        <span class="status-dot"></span>
        <span id="status-text" data-i18n="status_idle"></span>
      </div>
      <button id="overlay-toggle" class="icon-btn" hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="12" height="12" rx="1"/>
          <rect x="9" y="9" width="12" height="12" rx="1"/>
        </svg>
        <span data-i18n="btn_overlay"></span>
      </button>
      <div id="lang-picker" class="lang-picker">
        <button id="lang-btn" class="icon-btn" title="Language">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M2 12h20"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          <span id="lang-label"></span>
        </button>
        <ul id="lang-menu" class="lang-menu" hidden></ul>
      </div>
      <button id="change-folder" class="icon-btn" hidden title="Change folder">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <span data-i18n="btn_change_folder"></span>
      </button>
    </div>
  </header>

  <button id="overlay-exit" class="overlay-exit-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
    <span data-i18n="btn_dashboard"></span>
  </button>

  <div id="setup">
    <div class="setup-box">
      <div class="setup-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h2 data-i18n="setup_title"></h2>
      <ol>
        <li><code>/combatlog</code> <span data-i18n="setup_step1"></span></li>
        <li data-i18n="setup_step2"></li>
        <li data-i18n="setup_step3"></li>
      </ol>
      <button id="pick" class="primary" data-i18n="btn_pick"></button>
      <p class="hint" data-i18n="setup_hint"></p>
    </div>
  </div>

  <main id="viewer" hidden>
    <section id="survival" class="grid-panel" data-category="SURVIVAL">
      <header class="section-header">
        <span class="section-dot"></span>
        <h2 data-i18n="section_survival"></h2>
        <div class="section-line"></div>
      </header>
      <div class="icon-grid"></div>
      <p class="grid-empty" data-i18n="grid_empty"></p>
    </section>

    <section id="raidcd" class="grid-panel" data-category="RAID_CD">
      <header class="section-header">
        <span class="section-dot"></span>
        <h2 data-i18n="section_raidcd"></h2>
        <div class="section-line"></div>
      </header>
      <div class="icon-grid"></div>
      <p class="grid-empty" data-i18n="grid_empty"></p>
    </section>

    <div class="utility-row">
      <section id="heroism" class="utility-card heroism-card">
        <div class="utility-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M13 2L4.09 12.97 11 13l-1 9 8.91-10.97L12 11l1-9z"/>
          </svg>
        </div>
        <div class="utility-body">
          <div class="utility-title-row">
            <h3 data-i18n="section_heroism"></h3>
            <span class="utility-status"></span>
          </div>
          <div class="utility-detail"></div>
        </div>
      </section>

      <section id="battlerez" class="utility-card battlerez-card">
        <div class="utility-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2a8 8 0 0 0-8 8c0 3.4 2.1 6.3 5 7.5V20a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-2.5c2.9-1.2 5-4.1 5-7.5a8 8 0 0 0-8-8zM9 11a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm6 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm-3 4l-1.5 2h3L12 15z"/>
          </svg>
          <span class="charge-badge"></span>
        </div>
        <div class="utility-body">
          <div class="utility-title-row">
            <h3 data-i18n="section_battlerez"></h3>
            <span class="utility-status"></span>
          </div>
          <div class="utility-detail"></div>
        </div>
      </section>
    </div>

    <section id="deathlog" class="death-panel">
      <header class="section-header">
        <span class="section-dot"></span>
        <h2 data-i18n="section_deathlog"></h2>
        <span class="section-note" data-i18n="deathlog_clear_note"></span>
        <div class="section-line"></div>
      </header>
      <div class="death-list"></div>
      <p class="grid-empty" data-i18n="deathlog_empty"></p>
    </section>

    <aside id="overlay-view"></aside>
  </main>

  <div id="tooltip" class="tooltip" hidden></div>

  <script type="module" src="app.js"></script>
</body>
</html>
